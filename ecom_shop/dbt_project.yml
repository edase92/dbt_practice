name: ecom_shop

profile: ecom_shop

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"


models:
  ecom_shop:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
    intermediaate:
      +materialized: view
    marts:
      +materialized: table
