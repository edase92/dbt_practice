version: 2

models:
  - name: stg_users
    description: "Staging model for users table from The Look e-commerce dataset."
    config:
      materialized: view
      tags: ['staging', 'users']
    columns:
      - name: user_id
        description: "Unique identifier for each user."
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: error 
  - name: stg_orders
    description: "Staging model for orders table from The Look e-commerce dataset."
    config:
      materialized: view
      tags: ['staging', 'orders']
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: error 
      - name: user_id
        description: "Identifier for the user who placed the order."
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: num_of_item 
        description: "Number of items included in the order."
        tests:
          - negative_values:
              arguments:
                column_name: num_of_item
              config:
                severity: warn
  - name: stg_order_items
    description: "Staging model for order items table from The Look e-commerce dataset."
    config:
      materialized: view
      tags: ['staging', 'order_items']
    columns:
      - name: order_items_id
        description: "Unique identifier for each order item."
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: error 
      - name: order_id  
        description: "Identifier for the order to which the item belongs."
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        description: "Identifier for the product included in the order item."
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: inventory_item_id
        description: "Identifier for the inventory item included in the order item."
        tests:
          - not_null:
              config:
                severity: warn
      - name: user_id
        description: "Identifier for the user who placed the order item."
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
  - name: stg_products
    description: "Staging model for products table from The Look e-commerce dataset." 
    config:
      materialized: view
      tags: ['staging', 'products']
    columns:  
      - name: product_id
        description: "Unique identifier for each product."
        tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: error